name: CI

env:
  ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set reference slug
        run: echo "REF_SLUG=${GITHUB_REF////_}" >> $GITHUB_ENV
    
      - uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c
        with:
          msystem: MINGW64
          path-type: minimal
          update: true
          install: >-
            mingw-w64-x86_64-qt5-static
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-openssl
            make
            zip
            
      - name: Build
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          export PATH="/mingw64/qt5-static/bin:$PATH"
          
          cd src
          mkdir build
          cd build
          qmake ..
          make
          zip -j dsda-launcher-${{ env.REF_SLUG }}-win64.zip release/dsda-launcher.exe
          
      - name: Store build as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dsda-launcher-dev-win64
          path: src\build\dsda-launcher-${{ env.REF_SLUG }}-win64.zip

      - name: Release
        if: ${{ contains(github.ref, 'tags') }}
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          name: ${{ env.REF_SLUG }}
          allowUpdates: true
          artifacts: src/build/dsda-launcher-${{ env.REF_SLUG }}-win64.dmg
          
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730
        with:
          aqtversion: '==3.1.*'
          version: '6.2.0'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          tools: 'tools_opensslv3_src'
          
      - name: Build
        run: |
          sudo apt install libfuse2
          cd src
          mkdir build
          cd build
          qmake ..
          make

          wget -c -nv "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod a+x ./linuxdeploy-x86_64.AppImage
          wget -c -nv "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/latest/download/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod a+x ./linuxdeploy-plugin-qt-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --plugin=qt --executable=./dsda-launcher --output=appimage --appdir=./ --desktop-file=../icons/dsda-Launcher.desktop --icon-file=../icons/dsda-launcher.svg
      
      - name: Store build as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dsda-launcher-dev-linux
          path: src/build
          
  build-macos:
    name: MacOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      
      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730
        with:
          aqtversion: '==3.1.*'
          version: '6.2.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      - name: Set reference slug
        run: echo "REF_SLUG=${GITHUB_REF////_}" >> $GITHUB_ENV

      - name: Build
        run: |
          cd src
          mkdir build
          cd build
          qmake .. "CONFIG+=macdeploy"
          make
          macdeployqt ./dsda-launcher.app

          brew install create-dmg
          create-dmg --app-drop-link 10 10 ./dsda-launcher-${{ env.REF_SLUG }}-mac.dmg ./dsda-launcher.app
          
      - name: Store build as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dsda-launcher-dev-mac
          path: src/build/dsda-launcher-${{ env.REF_SLUG }}-mac.dmg
    
      - name: Release
        if: ${{ contains(github.ref, 'tags') }}
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          name: ${{ github.ref_name }}
          allowUpdates: true
          artifacts: src/build/dsda-launcher-${{ env.REF_SLUG }}-mac.dmg
